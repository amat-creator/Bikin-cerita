<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaskahKu - Penulis Naskah Pro</title>
  
  <!-- Tailwind CSS dengan Konfigurasi Mode Gelap -->
  <script>
    window.tailwind = {
      config: {
        darkMode: 'class',
        theme: { extend: {} }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel untuk JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- jsPDF untuk Ekspor PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up {
      animation: fadeUp 0.5s ease-out forwards;
      opacity: 0;
    }
    
    /* Paksa render ekspor jadi terang (Light Mode) meski aplikasi mode gelap */
    .export-force-light {
      background-color: white !important;
      color: black !important;
      color-scheme: light !important;
    }
  </style>
</head>
<body class="bg-[#f1f5f9] dark:bg-slate-900 text-slate-800 dark:text-slate-200 antialiased selection:bg-blue-100 dark:selection:bg-blue-900 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, size = 18, className = "", weight = "regular" }) => (
      <i className={`ph${weight === 'fill' ? '-fill' : (weight === 'bold' ? '-bold' : '')} ph-${name} ${className}`} style={{ fontSize: size }}></i>
    );

    const AutoResizeTextarea = ({ value, onChange, placeholder, className, autoFocus }) => {
      const textareaRef = useRef(null);
      useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = `${textareaRef.current.scrollHeight}px`;
        }
      }, [value]);
      return (
        <textarea ref={textareaRef} value={value} onChange={onChange} placeholder={placeholder} autoFocus={autoFocus} rows={1} className={`overflow-hidden resize-none outline-none bg-transparent transition-colors duration-200 ${className}`} />
      );
    };

    const App = () => {
      const MAX_LINES_PER_PAGE = 50; 

      // --- STATE DARK MODE ---
      const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('naskahku_theme') === 'dark');

      // --- STATE UNTUK PERPUSTAKAAN (LIBRARY) ---
      const [books, setBooks] = useState([]);
      const [activeBookId, setActiveBookId] = useState(null);
      const [bookTitle, setBookTitle] = useState("");
      const [bookAuthor, setBookAuthor] = useState(""); 
      const [bookToDelete, setBookToDelete] = useState(null); 

      // --- STATE NASKAH ---
      const [pages, setPages] = useState([]);
      const [characters, setCharacters] = useState([]);
      const [currentPageIndex, setCurrentPageIndex] = useState(null);
      
      // --- STATE UI & LAINNYA ---
      const [view, setView] = useState('library'); 
      const [showCharModal, setShowCharModal] = useState(false);
      const [newCharName, setNewCharName] = useState("");
      const [newCharRole, setNewCharRole] = useState(""); 
      const [newCharDesc, setNewCharDesc] = useState("");
      const [newCharAppearance, setNewCharAppearance] = useState("");
      const [showDialogMenu, setShowDialogMenu] = useState(false);
      const [charSearchQuery, setCharSearchQuery] = useState("");
      const [isManageMode, setIsManageMode] = useState(false);
      const [selectedPages, setSelectedPages] = useState([]);
      const [showKrisModal, setShowKrisModal] = useState(false);
      const [showGuideModal, setShowGuideModal] = useState(false); // STATE BARU: Panduan Penggunaan
      
      // STATE BARU: Asisten Gemini AI
      const [showAIModal, setShowAIModal] = useState(false);
      const [isAILoading, setIsAILoading] = useState(false);
      const [aiType, setAiType] = useState('action');
      const [aiCharId, setAiCharId] = useState("");

      const fileInputRef = useRef(null);
      const [toastMessage, setToastMessage] = useState("");
      const [history, setHistory] = useState([]);
      const [showHistoryModal, setShowHistoryModal] = useState(false);
      
      // State Export
      const [isExporting, setIsExporting] = useState(false);
      const [showExportModal, setShowExportModal] = useState(false);
      const [exportSelection, setExportSelection] = useState([]);
      const [exportFormat, setExportFormat] = useState('pdf'); 
      const [includeCover, setIncludeCover] = useState(true);

      const createEmptyBook = () => ({
        id: Date.now().toString(),
        title: "Buku Baru",
        author: "Penulis",
        pages: [{ 
          id: 1, 
          blocks: [
            { id: Date.now().toString() + '_1', type: 'heading', character: '', text: '' },
            { id: Date.now().toString() + '_2', type: 'action', character: '', text: '' }
          ] 
        }],
        characters: [{ id: Date.now().toString(), name: "NARATOR", role: "Pencerita", description: "Suara latar yang menceritakan adegan.", appearance: "-" }],
        updatedAt: Date.now()
      });

      // Terapkan Mode Gelap ke document root
      useEffect(() => {
        if (isDarkMode) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('naskahku_theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('naskahku_theme', 'light');
        }
      }, [isDarkMode]);

      // Load Data (V3)
      useEffect(() => {
        const savedBooks = localStorage.getItem('script_app_index_v3');
        if (savedBooks) {
          try { 
            const parsed = JSON.parse(savedBooks);
            if (parsed.length > 0) setBooks(parsed);
            else setBooks([createEmptyBook()]);
          } catch (e) { setBooks([createEmptyBook()]); }
        } else {
          setBooks([createEmptyBook()]);
        }
      }, []);

      // Simpan Data
      useEffect(() => {
        localStorage.setItem('script_app_index_v3', JSON.stringify(books));
      }, [books]);

      // Sinkronisasi Buku Aktif
      useEffect(() => {
        if (activeBookId) {
          setBooks(prevBooks => {
            const currentBook = prevBooks.find(b => b.id === activeBookId);
            if (currentBook && (currentBook.title !== bookTitle || currentBook.author !== bookAuthor || currentBook.pages !== pages || currentBook.characters !== characters)) {
              return prevBooks.map(b => 
                b.id === activeBookId ? { ...b, title: bookTitle, author: bookAuthor, pages, characters, updatedAt: Date.now() } : b
              );
            }
            return prevBooks;
          });
        }
      }, [pages, characters, bookTitle, bookAuthor, activeBookId]);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(""), 3000);
      };

      const handleCreateBook = () => {
        const newBook = createEmptyBook();
        setBooks([...books, newBook]);
        showToast("Buku baru berhasil dibuat!");
      };

      const openBook = (book) => {
        setActiveBookId(book.id);
        setBookTitle(book.title);
        setBookAuthor(book.author || "Penulis"); 
        setPages(book.pages);
        
        const migratedChars = (book.characters || []).map((c, i) => 
          typeof c === 'string' ? { id: Date.now().toString() + i, name: c, role: "Belum Ditentukan", description: "", appearance: "" } : c
        );
        setCharacters(migratedChars);
        setHistory([]); 
        setView('grid');
      };

      const closeBook = () => { setActiveBookId(null); setView('library'); };
      const confirmDeleteBook = (bookId) => setBookToDelete(bookId);
      const executeDeleteBook = () => {
        if (bookToDelete) {
          const remainingBooks = books.filter(b => b.id !== bookToDelete);
          setBooks(remainingBooks.length === 0 ? [createEmptyBook()] : remainingBooks);
          setBookToDelete(null);
          showToast("Buku berhasil dihapus.");
        }
      };

      const saveToHistory = (actionName) => {
        const newLog = { id: Date.now(), action: actionName, timestamp: new Date().toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }), data: JSON.parse(JSON.stringify(pages)) };
        setHistory([newLog, ...history].slice(0, 10));
      };
      const restoreFromHistory = (logData) => { setPages(logData); setShowHistoryModal(false); showToast("Dipulihkan!"); };

      const exportBackup = () => {
        const backupData = { books: books, version: 'index_v3' };
        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url; link.download = `Backup_Buku_${new Date().toISOString().split('T')[0]}.json`; link.click(); URL.revokeObjectURL(url);
        showToast("Backup diunduh!");
      };
      const importBackup = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.books && Array.isArray(data.books)) {
              setBooks(data.books); showToast("Backup dipulihkan!"); if (activeBookId) closeBook(); 
            } else showToast("Format tidak valid.");
          } catch (err) { showToast("Gagal membaca file."); }
        };
        reader.readAsText(file); e.target.value = null; 
      };

      // --- PENGOLAHAN HALAMAN & ADEGAN ---
      const getNumberedPages = () => {
        let sceneCount = 1;
        return pages.map(page => ({
          ...page,
          blocks: page.blocks.map(block => {
            if (block.type === 'heading') {
              return { ...block, sceneNumber: sceneCount++ };
            }
            return block;
          })
        }));
      };
      const numberedPages = getNumberedPages();

      const addPage = () => {
        const newId = pages.length > 0 ? pages[pages.length - 1].id + 1 : 1;
        setPages([...pages, { id: newId, blocks: [{ id: Date.now().toString(), type: 'action', text: '' }] }]);
      };
      const deletePage = (index) => {
        if (pages.length === 1) {
          saveToHistory(`Bersihkan Hal. ${pages[index].id}`);
          const newPages = [...pages];
          newPages[index] = { ...newPages[index], blocks: [{ id: Date.now().toString(), type: 'action', text: '' }] };
          setPages(newPages); showToast("Halaman dibersihkan."); return;
        }
        saveToHistory(`Hapus Hal. ${pages[index].id}`);
        const newPages = pages.filter((_, i) => i !== index);
        setPages(newPages.map((page, i) => ({ ...page, id: i + 1 })));
        if (view === 'editor') setView('grid');
        showToast("Halaman dihapus.");
      };
      const deleteSelectedPages = () => {
        if (selectedPages.length === 0) return;
        saveToHistory(`Hapus Massal`);
        const newPages = pages.filter((_, index) => !selectedPages.includes(index));
        if (newPages.length === 0) setPages([{ id: 1, blocks: [{ id: Date.now().toString(), type: 'action', text: '' }] }]);
        else setPages(newPages.map((page, i) => ({ ...page, id: i + 1 })));
        setSelectedPages([]); setIsManageMode(false); showToast("Terhapus.");
      };
      const toggleManageMode = () => { setIsManageMode(!isManageMode); setSelectedPages([]); };
      const togglePageSelection = (index) => { setSelectedPages(selectedPages.includes(index) ? selectedPages.filter(i => i !== index) : [...selectedPages, index]); };
      const handleSelectAll = () => { setSelectedPages(selectedPages.length === pages.length ? [] : pages.map((_, i) => i)); };
      const movePageOrder = (index, direction) => {
        const newPages = [...pages];
        if (direction === 'left' && index > 0) { const temp = newPages[index]; newPages[index] = newPages[index - 1]; newPages[index - 1] = temp; } 
        else if (direction === 'right' && index < pages.length - 1) { const temp = newPages[index]; newPages[index] = newPages[index + 1]; newPages[index + 1] = temp; } 
        else return;
        setPages(newPages.map((page, i) => ({ ...page, id: i + 1 }))); setSelectedPages([]); 
      };

      const getPageLines = (pageIndex) => {
        if (pageIndex === null || !pages[pageIndex]) return 0;
        return pages[pageIndex].blocks.reduce((totalLines, block) => {
          if (block.type === 'heading') return totalLines + 2.5; 
          const textLines = block.text.split('\n').reduce((acc, line) => {
            const charsPerLine = block.type === 'action' ? 75 : 60;
            return acc + Math.max(1, Math.ceil(line.length / charsPerLine));
          }, 0);
          if (block.type === 'action') return totalLines + 1.2 + textLines; 
          if (block.type === 'dialogue') return totalLines + 1.5 + textLines; 
          return totalLines + textLines;
        }, 0);
      };

      // DIPERBAIKI: Logika manajemen memori (State) agar tombol sampah langsung bekerja
      const addBlock = (type, character = "", initialText = "") => {
        if (currentPageIndex === null) return;
        setPages(prevPages => prevPages.map((p, i) => 
          i === currentPageIndex 
            ? { ...p, blocks: [...p.blocks, { id: Date.now().toString(), type, character, text: initialText }] } 
            : p
        ));
      };

      const updateBlockText = (blockId, newText) => {
        if (currentPageIndex === null) return;
        setPages(prevPages => prevPages.map((p, i) => {
          if (i === currentPageIndex) {
            return {
              ...p,
              blocks: p.blocks.map(b => b.id === blockId ? { ...b, text: newText } : b)
            };
          }
          return p;
        }));
      };

      const removeBlock = (blockId) => {
        if (currentPageIndex === null) return;
        setPages(prevPages => prevPages.map((p, i) => {
          if (i === currentPageIndex) {
            const newBlocks = p.blocks.filter(b => b.id !== blockId);
            return {
              ...p,
              blocks: newBlocks.length > 0 ? newBlocks : [{ id: Date.now().toString(), type: 'action', text: '' }]
            };
          }
          return p;
        }));
        showToast("Baris dihapus.");
      };

      const moveBlock = (index, direction) => {
        if (currentPageIndex === null) return;
        setPages(prevPages => prevPages.map((p, i) => {
          if (i === currentPageIndex) {
            const blocks = [...p.blocks];
            if (direction === 'up' && index > 0) {
              [blocks[index], blocks[index - 1]] = [blocks[index - 1], blocks[index]];
            } else if (direction === 'down' && index < blocks.length - 1) {
              [blocks[index], blocks[index + 1]] = [blocks[index + 1], blocks[index]];
            }
            return { ...p, blocks };
          }
          return p;
        }));
      };
      const openEditor = (index) => { setCurrentPageIndex(index); setView('editor'); };

      const addCharacter = (e) => {
        e.preventDefault();
        if (newCharName.trim()) {
          setCharacters([...characters, { id: Date.now().toString(), name: newCharName.trim().toUpperCase(), role: newCharRole.trim() || "TIDAK DITENTUKAN", description: newCharDesc, appearance: newCharAppearance }]);
          setNewCharName(""); setNewCharRole(""); setNewCharDesc(""); setNewCharAppearance("");
        }
      };

      const openExportModal = () => { setExportSelection(pages.map((_, i) => i)); setShowExportModal(true); };
      const toggleExportSelection = (index) => { setExportSelection(exportSelection.includes(index) ? exportSelection.filter(i => i !== index) : [...exportSelection, index]); };

      // --- ASISTEN GEMINI AI INTEGRATION ---
      const generateAIContent = async (e) => {
        e.preventDefault();
        setIsAILoading(true);
        
        try {
          // Bangun konteks cerita dari halaman saat ini
          const currentBlocks = pages[currentPageIndex].blocks.slice(-12); // Ambil 12 blok terakhir agar AI paham adegan
          const context = currentBlocks.map(b => {
            if (b.type === 'heading') return `ADEGAN: ${b.text}`;
            if (b.type === 'action') return `DESKRIPSI: ${b.text}`;
            if (b.type === 'dialogue') return `${b.character}: ${b.text}`;
            return "";
          }).join("\n");

          let prompt = "";
          let charName = "";

          // Tentukan instruksi (prompt) ke sistem Gemini
          if (aiType === 'action') {
             prompt = `Berikut adalah cuplikan naskah skenario:\n\n${context}\n\nTolong lanjutkan cerita di atas dengan menuliskan 1 paragraf DESKRIPSI (action) kejadian selanjutnya secara kreatif. Tuliskan dalam bahasa Indonesia. Tuliskan HANYA isi paragrafnya saja, tanpa markdown, penjelasan, atau tanda kutip.`;
          } else {
             const selectedChar = characters.find(c => c.id === aiCharId);
             if (!selectedChar) throw new Error("Pilih karakter terlebih dahulu.");
             charName = selectedChar.name;
             const charProfile = selectedChar.description ? `(Sifat/Tugas: ${selectedChar.description})` : "";
             
             prompt = `Berikut adalah cuplikan naskah skenario:\n\n${context}\n\nBerdasarkan situasi cerita terakhir, buatlah 1-2 kalimat dialog natural yang akan diucapkan oleh karakter bernama ${charName} ${charProfile}. Tuliskan HANYA isi dialognya saja, tanpa nama karakter, tanda kutip, atau markdown.`;
          }

          const apiKey = "";
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const payload = { contents: [{ parts: [{ text: prompt }] }] };

          // Exponential backoff (Mencoba ulang hingga 5x jika ada gangguan server)
          let retries = 5;
          let delay = 1000;
          let resultText = "";

          for (let i = 0; i < retries; i++) {
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
              const data = await response.json();
              resultText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
              break; 
            } catch (error) {
              if (i === retries - 1) throw error;
              await new Promise(res => setTimeout(res, delay));
              delay *= 2;
            }
          }

          if (resultText) {
             // Bersihkan teks dari tanda kutip bawaan AI
             resultText = resultText.replace(/^["']|["']$/g, '');
             addBlock(aiType, charName, resultText);
             showToast("AI berhasil menambahkan naskah! ✨");
             setShowAIModal(false);
          } else {
             throw new Error("Respons kosong.");
          }

        } catch (error) {
          console.error(error);
          showToast(error.message === "Pilih karakter terlebih dahulu." ? error.message : "Gagal memanggil AI. Coba lagi.");
        } finally {
          setIsAILoading(false);
        }
      };

      // --- EKSPOR LANJUTAN (GAMBAR/ZIP & PDF) ---
      const executeExport = async () => {
        setIsExporting(true);
        setShowExportModal(false);
        showToast(`Memproses dokumen...`);

        if (!window.html2canvas) {
          await new Promise((res, rej) => { const s = document.createElement('script'); s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'; s.onload = res; s.onerror = rej; document.head.appendChild(s); });
        }

        const safeTitle = bookTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'NaskahKu';

        try {
          if (exportFormat === 'pdf') {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            
            if (includeCover) {
              const coverArea = document.getElementById('export-cover-page');
              if (coverArea) {
                const coverCanvas = await window.html2canvas(coverArea, { scale: 2, backgroundColor: '#ffffff', scrollY: 0, scrollX: 0 });
                pdf.addImage(coverCanvas.toDataURL('image/png'), 'PNG', 0, 0, pdfWidth, pdfHeight);
                if (exportSelection.length > 0) pdf.addPage();
              }
            }

            for (let i = 0; i < exportSelection.length; i++) {
              const pageId = pages[exportSelection[i]].id;
              const captureArea = document.getElementById(`export-page-${pageId}`);
              if (captureArea) {
                const canvas = await window.html2canvas(captureArea, { scale: 2, backgroundColor: '#ffffff', scrollY: 0, scrollX: 0 });
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pdfWidth, pdfHeight);
                if (i !== exportSelection.length - 1) pdf.addPage();
              }
            }
            pdf.save(`${safeTitle}.pdf`);

          } else {
            if (exportSelection.length === 1 && !includeCover) {
              const pageId = pages[exportSelection[0]].id;
              const canvas = await window.html2canvas(document.getElementById(`export-page-${pageId}`), { scale: 2, backgroundColor: '#ffffff', scrollY: 0 });
              const link = document.createElement('a'); link.href = canvas.toDataURL('image/png'); link.download = `${safeTitle}_Hal_${pageId}.png`; link.click();
            } else {
              if (!window.JSZip) { await new Promise((res, rej) => { const s = document.createElement('script'); s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }
              const zip = new window.JSZip();
              
              if (includeCover) {
                const cvCanvas = await window.html2canvas(document.getElementById('export-cover-page'), { scale: 2, backgroundColor: '#ffffff', scrollY: 0 });
                zip.file(`${safeTitle}_00_Sampul.png`, cvCanvas.toDataURL('image/png').replace(/^data:image\/(png|jpg);base64,/, ""), {base64: true});
              }
              
              for (const pageIndex of exportSelection) {
                const pageId = pages[pageIndex].id;
                const canvas = await window.html2canvas(document.getElementById(`export-page-${pageId}`), { scale: 2, backgroundColor: '#ffffff', scrollY: 0 });
                zip.file(`${safeTitle}_Hal_${pageId}.png`, canvas.toDataURL('image/png').replace(/^data:image\/(png|jpg);base64,/, ""), {base64: true});
              }
              const content = await zip.generateAsync({type:"blob"});
              const link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = `${safeTitle}_Gambar.zip`; link.click();
            }
          }
          showToast("Berhasil diunduh!");
        } catch (error) { console.error(error); showToast("Terjadi kesalahan."); } 
        finally { setIsExporting(false); }
      };

      const currentLines = currentPageIndex !== null ? getPageLines(currentPageIndex) : 0;
      const isOverLimit = currentLines >= MAX_LINES_PER_PAGE;

      return (
        <div className="min-h-screen flex flex-col font-sans transition-colors duration-300">
          
          {/* AREA RENDER EXPORT (SELALU TERANG / LIGHT MODE) */}
          {view !== 'library' && (
            <div className="absolute top-0 left-[-9999px] opacity-0 pointer-events-none z-[-1] export-force-light font-[Courier_New]">
              <div id="image-export-container" className="flex flex-col gap-4">
                
                {/* HALAMAN SAMPUL (COVER) */}
                <div id="export-cover-page" className="bg-white relative overflow-hidden flex flex-col justify-center items-center" style={{ width: '794px', height: '1123px', padding: '80px', color: 'black' }}>
                   <div className="w-full h-full flex flex-col items-center justify-center border-4 border-double border-slate-200 p-10">
                     <h1 className="text-[42px] font-black uppercase tracking-widest text-center leading-tight mb-16 px-10">{bookTitle}</h1>
                     <div className="text-center">
                       <p className="text-[18px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Naskah Oleh:</p>
                       <p className="text-[28px] font-black uppercase">{bookAuthor}</p>
                     </div>
                   </div>
                   <div className="absolute bottom-16 right-16 text-right opacity-50">
                     <p className="text-[14px] font-bold tracking-widest">Draf: {new Date().toLocaleDateString('id-ID')}</p>
                   </div>
                </div>

                      <div className="space-y-1">
                        <label className="text-[10px] font-black text-slate-400 dark:text-slate-400 tracking-widest ml-1">PERAN TOKOH</label>
                        <input type="text" value={newCharRole} onChange={(e) => setNewCharRole(e.target.value)} placeholder="Contoh: Pahlawan, Penjahat..." className="w-full border-2 border-slate-300 dark:border-slate-600 hover:border-slate-400 focus:border-blue-500 rounded-xl px-4 py-2.5 outline-none bg-slate-50 dark:bg-slate-800 dark:text-white focus:bg-white dark:focus:bg-slate-900 uppercase font-bold text-sm text-slate-700 dark:text-slate-200 transition-colors" />
                      </div>
                      
                      <div className="sm:col-span-2 space-y-1">
                        <label className="text-[10px] font-black text-slate-400 dark:text-slate-400 tracking-widest ml-1">LATAR BELAKANG / TUGAS</label>
                        <textarea value={newCharDesc} onChange={(e) => setNewCharDesc(e.target.value)} placeholder="Deskripsikan pekerjaan, sifat, atau peran karakter ini dalam cerita..." className="w-full border-2 border-slate-300 dark:border-slate-600 hover:border-slate-400 focus:border-blue-500 rounded-xl px-4 py-3 outline-none bg-slate-50 dark:bg-slate-800 dark:text-white focus:bg-white dark:focus:bg-slate-900 font-medium text-sm text-slate-700 dark:text-slate-300 resize-none h-20 transition-colors leading-relaxed" />
                      </div>
                      
                      <div className="sm:col-span-2 space-y-1">
                        <label className="text-[10px] font-black text-slate-400 dark:text-slate-400 tracking-widest ml-1">PENAMPILAN / PAKAIAN</label>
                        <textarea value={newCharAppearance} onChange={(e) => setNewCharAppearance(e.target.value)} placeholder="Deskripsikan bentuk fisik, gaya rambut, atau pakaian khas karakter ini..." className="w-full border-2 border-slate-300 dark:border-slate-600 hover:border-slate-400 focus:border-blue-500 rounded-xl px-4 py-3 outline-none bg-slate-50 dark:bg-slate-800 dark:text-white focus:bg-white dark:focus:bg-slate-900 font-medium text-sm text-slate-700 dark:text-slate-300 resize-none h-20 transition-colors leading-relaxed" />
                      </div>
                      
                      <button type="submit" className="sm:col-span-2 bg-slate-900 dark:bg-blue-600 text-white px-4 py-3.5 rounded-xl font-black shadow-[3px_3px_0px_rgba(15,23,42,0.2)] dark:shadow-none hover:shadow-[5px_5px_0px_rgba(15,23,42,0.2)] dark:hover:bg-blue-500 hover:-translate-y-0.5 active:translate-y-[3px] active:shadow-none transition-all flex justify-center items-center gap-2 mt-2">
                        <Icon name="plus" size={18} weight="bold" /> SIMPAN KARAKTER KE DATABASE
                      </button>
                    </form>
                  </div>
                  
                  <div className="flex items-center justify-between mb-4 px-1">
                    <h4 className="font-black text-sm flex items-center gap-2 text-slate-800 dark:text-white"><Icon name="users-three" size={20} weight="fill" className="text-amber-500"/> Daftar Karakter</h4>
                    <span className="bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-black text-[10px] px-2.5 py-1 rounded-md">{characters.length} TOKOH</span>
                  </div>
                  
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    {characters.map((char) => (
                      <div key={char.id} className="bg-white dark:bg-slate-700 p-5 border-2 border-slate-200 dark:border-slate-600 rounded-2xl hover:border-blue-300 dark:hover:border-blue-500 hover:shadow-lg transition-all duration-300 group relative flex flex-col gap-3">
                        <div className="flex justify-between items-start">
                          <div>
                            <span className="font-black text-base tracking-wide uppercase text-slate-900 dark:text-white block mb-1">{char.name}</span>
                            {char.role !== "TIDAK DITENTUKAN" && (
                              <span className="inline-block text-[9px] font-bold px-2.5 py-1 rounded-md bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border border-blue-100 dark:border-blue-800 uppercase tracking-widest">{char.role}</span>
                            )}
                          </div>
                          <button type="button" onClick={() => setCharacters(characters.filter(c => c.id !== char.id))} className="text-slate-300 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 bg-slate-50 dark:bg-slate-800 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded-lg shrink-0 ml-2 transition-colors border border-transparent hover:border-red-100 dark:hover:border-red-900/50">
                            <Icon name="trash" size={18} weight="fill" />
                          </button>
                        </div>
                        
                        <div className="h-px w-full bg-slate-100 dark:bg-slate-600 my-1"></div>
                        
                        {char.description && (
                          <div className="text-[12px] text-slate-600 dark:text-slate-300 leading-relaxed">
                            <strong className="text-slate-800 dark:text-slate-100 text-[10px] uppercase tracking-widest block mb-0.5"><Icon name="briefcase" size={12} className="inline mr-1"/>Tugas:</strong> {char.description}
                          </div>
                        )}
                        {char.appearance && (
                          <div className="text-[12px] text-slate-600 dark:text-slate-300 leading-relaxed">
                            <strong className="text-slate-800 dark:text-slate-100 text-[10px] uppercase tracking-widest block mb-0.5"><Icon name="t-shirt" size={12} className="inline mr-1"/>Penampilan:</strong> {char.appearance}
                          </div>
                        )}
                        {!char.description && !char.appearance && (
                          <div className="text-[11px] text-slate-400 dark:text-slate-500 italic">Belum ada deskripsi profil.</div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* --- MODAL PUSAKA KERIS BESAR --- */}
          {showKrisModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-md animate-in fade-in duration-300" onClick={() => setShowKrisModal(false)}>
              <div className="relative animate-in zoom-in-95 duration-500 flex flex-col items-center max-w-md" onClick={(e) => e.stopPropagation()}>
                <div className="bg-white/10 backdrop-blur-md border border-white/20 px-6 py-4 rounded-3xl mb-6 shadow-2xl text-center animate-in slide-in-from-top-4 duration-700 delay-150">
                  <p className="text-amber-50 font-medium text-sm sm:text-base leading-relaxed tracking-wide">
                    "Jika tidak bisa sawer, kirim Al-Fatihah aja heee...<br/>mudahan bermanfaat ya 😁"
                  </p>
                </div>
                <div className="relative flex justify-center items-center">
                  <div className="absolute inset-0 bg-amber-500 blur-[80px] opacity-40 rounded-full animate-pulse"></div>
                  <img src="https://i.supaimg.com/ad460eb2-b309-4aa9-b61c-59eea64d0f56/84282f7b-0886-40a8-b4cc-752e51042834.png" alt="Pusaka Keris Besar" className="w-56 h-56 sm:w-72 sm:h-72 object-contain drop-shadow-[0_0_25px_rgba(255,255,255,0.4)] hover:scale-105 transition-transform duration-500 cursor-pointer relative z-10" onClick={() => setShowKrisModal(false)} title="Simpan Pusaka" />
                </div>
                <h2 className="text-white font-black text-3xl sm:text-4xl mt-6 tracking-[0.2em] drop-shadow-lg text-center uppercase">PUSAKA SAKTI</h2>
                <p className="text-amber-200 font-bold text-sm sm:text-base mt-2 tracking-widest text-center">NaskahKu x Gemini AI</p>
                <button type="button" onClick={() => setShowKrisModal(false)} className="mt-8 bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-2xl font-black tracking-wider transition-all border border-white/20 backdrop-blur-md shadow-lg active:scale-95">TUTUP</button>
              </div>
            </div>
          )}

          {/* --- MODAL PANDUAN PENGGUNAAN --- */}
          {showGuideModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white dark:bg-slate-800 rounded-[2rem] w-full max-w-2xl shadow-2xl border-4 border-slate-100 dark:border-slate-700 overflow-hidden animate-in zoom-in-95 flex flex-col max-h-[90vh]">
                <div className="p-5 sm:p-6 border-b border-slate-200 dark:border-slate-700 bg-blue-50 dark:bg-slate-900 flex justify-between items-center shrink-0">
                  <h3 className="text-xl font-black flex items-center gap-2 text-blue-700 dark:text-blue-400">
                    <Icon name="book-open-text" size={24} weight="fill" /> Panduan NaskahKu
                  </h3>
                  <button onClick={() => setShowGuideModal(false)} className="text-slate-400 hover:text-slate-900 dark:hover:text-white bg-white dark:bg-slate-800 p-1.5 rounded-full shadow-sm border border-slate-200 dark:border-slate-600">
                    <Icon name="x" size={18} weight="bold" />
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto custom-scrollbar bg-slate-50/50 dark:bg-slate-800/50 space-y-6 text-slate-700 dark:text-slate-300">
                  
                  <div className="flex gap-4 items-start">
                    <div className="bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 p-3 rounded-2xl shrink-0"><Icon name="books" size={24} weight="fill" /></div>
                    <div>
                      <h4 className="font-black text-slate-900 dark:text-white text-base mb-1">1. Manajemen Buku</h4>
                      <p className="text-sm leading-relaxed mb-2">Aplikasi ini berpusat pada <strong>Rak Buku</strong>. Setiap buku berdiri sendiri (punya daftar karakter & halamannya sendiri).</p>
                      <ul className="text-sm list-disc pl-4 space-y-1 opacity-90">
                        <li>Klik <strong>+ Buku Baru</strong> untuk membuat karya baru.</li>
                        <li>Klik <strong>Ikon Sampah</strong> di sudut kartu buku untuk menghapusnya.</li>
                      </ul>
                    </div>
                  </div>

                  <div className="flex gap-4 items-start">
                    <div className="bg-amber-100 dark:bg-amber-900/50 text-amber-600 dark:text-amber-400 p-3 rounded-2xl shrink-0"><Icon name="pencil-line" size={24} weight="fill" /></div>
                    <div>
                      <h4 className="font-black text-slate-900 dark:text-white text-base mb-1">2. Menulis Naskah (Editor)</h4>
                      <p className="text-sm leading-relaxed mb-2">Editor dirancang seperti format naskah film standar (Screenplay):</p>
                      <ul className="text-sm list-disc pl-4 space-y-2 opacity-90">
                        <li><strong>Teks Besar (Heading):</strong> Untuk menulis lokasi dan waktu (cth: <em>INT. KAMAR - MALAM</em>). Nomor adegan akan muncul otomatis!</li>
                        <li><strong>Teks Biasa (Action):</strong> Untuk mendeskripsikan tindakan atau suasana.</li>
                        <li><strong>Dialog:</strong> Untuk percakapan. Klik tombol <em>Dialog</em> dan pilih karakter untuk memunculkan kolom percakapan.</li>
                      </ul>
                    </div>
                  </div>

                  <div className="flex gap-4 items-start">
                    <div className="bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 p-3 rounded-2xl shrink-0"><Icon name="users" size={24} weight="fill" /></div>
                    <div>
                      <h4 className="font-black text-slate-900 dark:text-white text-base mb-1">3. Database Karakter</h4>
                      <p className="text-sm leading-relaxed">Klik tombol <strong>Karakter</strong> di menu atas untuk mendata nama, peran, latar belakang, dan kostum aktor/tokoh buatanmu. Nama-nama ini akan otomatis muncul saat kamu membuat Dialog.</p>
                    </div>
                  </div>

                  <div className="flex gap-4 items-start">
                    <div className="bg-purple-100 dark:bg-purple-900/50 text-purple-600 dark:text-purple-400 p-3 rounded-2xl shrink-0"><Icon name="export" size={24} weight="fill" /></div>
                    <div>
                      <h4 className="font-black text-slate-900 dark:text-white text-base mb-1">4. Backup & Unduh (Export)</h4>
                      <ul className="text-sm list-disc pl-4 space-y-2 opacity-90">
                        <li><strong>Tombol Backup Semua (Rak Buku):</strong> Mengunduh seluruh bukumu dalam format kode JSON agar aman.</li>
                        <li><strong>Tombol Unduh (Dalam Buku):</strong> Mengekspor naskahmu menjadi file <strong>PDF</strong> (standar industri) atau gambar <strong>PNG</strong> siap cetak.</li>
                      </ul>
                    </div>
                  </div>

                  <div className="flex gap-4 items-start">
                    <div className="bg-rose-100 dark:bg-rose-900/50 text-rose-600 dark:text-rose-400 p-3 rounded-2xl shrink-0"><Icon name="warning-circle" size={24} weight="fill" /></div>
                    <div>
                      <h4 className="font-black text-slate-900 dark:text-white text-base mb-1">5. Penting! Data Tersimpan di Browser</h4>
                      <p className="text-sm leading-relaxed">Aplikasi ini menyimpan data secara lokal di browser kamu (Local Storage). <strong>JANGAN MENGHAPUS CACHE/DATA BROWSER</strong> jika belum melakukan <em>Backup</em>, karena naskahmu bisa ikut terhapus.</p>
                    </div>
                  </div>

                </div>
                
                <div className="p-5 border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                  <button onClick={() => setShowGuideModal(false)} className="w-full bg-slate-900 dark:bg-slate-700 text-white py-3 rounded-xl font-black text-sm hover:bg-slate-800 dark:hover:bg-slate-600 active:scale-[0.98] transition-all">
                    Saya Mengerti, Mulai Menulis!
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- MODAL ASISTEN GEMINI AI --- */}
          {showAIModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white dark:bg-slate-800 rounded-[2rem] w-full max-w-md shadow-2xl border-4 border-purple-200 dark:border-purple-900 overflow-hidden animate-in zoom-in-95 flex flex-col">
                <div className="p-5 sm:p-6 border-b-4 border-purple-200 dark:border-purple-900 bg-purple-50 dark:bg-purple-950/30 flex justify-between items-center shrink-0">
                  <h3 className="text-xl font-black flex items-center gap-2 text-purple-800 dark:text-purple-300">
                    <Icon name="sparkle" size={24} weight="fill" className="text-purple-500" /> Asisten Gemini
                  </h3>
                  <button onClick={() => !isAILoading && setShowAIModal(false)} className="text-slate-400 hover:text-slate-900 dark:hover:text-white bg-white dark:bg-slate-800 p-1.5 rounded-full shadow-sm border border-slate-200 dark:border-slate-600">
                    <Icon name="x" size={18} weight="bold" />
                  </button>
                </div>
                
                <form onSubmit={generateAIContent} className="p-6 bg-slate-50/50 dark:bg-slate-800/50 space-y-5 text-slate-700 dark:text-slate-300">
                  <p className="text-sm font-medium leading-relaxed">
                    AI akan membaca adegan terakhirmu dan membantu melanjutkan naskah. Apa yang ingin kamu buat?
                  </p>

                  <div className="space-y-3">
                    <label className={`flex items-center gap-3 p-4 rounded-xl border-2 cursor-pointer transition-all ${aiType === 'action' ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/20 shadow-md' : 'border-slate-200 dark:border-slate-600 hover:border-purple-300 bg-white dark:bg-slate-700'}`}>
                      <input type="radio" name="aitype" value="action" checked={aiType === 'action'} onChange={() => setAiType('action')} className="w-4 h-4 text-purple-600" />
                      <div>
                        <span className="block font-black text-sm text-slate-900 dark:text-white">Lanjutkan Cerita (Action)</span>
                        <span className="block text-xs text-slate-500 dark:text-slate-400 mt-0.5">Tuliskan deskripsi tindakan / kejadian selanjutnya.</span>
                      </div>
                    </label>

                    <label className={`flex items-center gap-3 p-4 rounded-xl border-2 cursor-pointer transition-all ${aiType === 'dialogue' ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/20 shadow-md' : 'border-slate-200 dark:border-slate-600 hover:border-purple-300 bg-white dark:bg-slate-700'}`}>
                      <input type="radio" name="aitype" value="dialogue" checked={aiType === 'dialogue'} onChange={() => setAiType('dialogue')} className="w-4 h-4 text-purple-600" />
                      <div className="w-full">
                        <span className="block font-black text-sm text-slate-900 dark:text-white">Ide Dialog Karakter</span>
                        <span className="block text-xs text-slate-500 dark:text-slate-400 mt-0.5 mb-2">Tulis dialog brilian untuk merespon adegan terakhir.</span>
                        
                        {aiType === 'dialogue' && (
                          <select value={aiCharId} onChange={(e) => setAiCharId(e.target.value)} className="w-full border border-slate-300 dark:border-slate-500 rounded-lg px-3 py-2 text-sm font-bold bg-white dark:bg-slate-800 text-slate-900 dark:text-white outline-none focus:border-purple-500 mt-1" required>
                            <option value="" disabled>-- Pilih Karakter --</option>
                            {characters.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                          </select>
                        )}
                      </div>
                    </label>
                  </div>

                  <button type="submit" disabled={isAILoading || (aiType === 'dialogue' && !aiCharId)} className="w-full bg-purple-600 text-white py-3.5 rounded-xl font-black text-sm hover:bg-purple-700 shadow-[0_4px_14px_rgba(168,85,247,0.39)] hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 disabled:opacity-50 disabled:hover:translate-y-0 disabled:shadow-none flex justify-center items-center gap-2 mt-2">
                    {isAILoading ? (
                      <><Icon name="spinner-gap" size={18} className="animate-spin" /> Meminta Bantuan...</>
                    ) : (
                      <><Icon name="sparkle" size={18} weight="fill" /> Generate Naskah</>
                    )}
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* --- TOAST NOTIFIKASI --- */}
          {toastMessage && (
            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[110] animate-in slide-in-from-bottom-5 fade-in duration-300">
              <div className="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-6 py-3 rounded-full shadow-2xl font-bold text-[13px] flex items-center gap-2.5 border border-slate-700/50 dark:border-slate-200">
                <Icon name="check-circle" size={18} weight="fill" className="text-green-400 dark:text-green-500" />
                {toastMessage}
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
